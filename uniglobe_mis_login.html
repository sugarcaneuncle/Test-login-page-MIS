<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGLOBE MIS - Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border: 2px solid #0066cc;
            border-radius: 8px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            min-height: 600px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background-color: #1e3a8a;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .logo-green-curve {
            position: absolute;
            bottom: -10px;
            left: -10px;
            width: 60px;
            height: 80px;
            background-color: #00ff88;
            border-radius: 50% 0 0 50%;
            transform: rotate(-15deg);
        }

        .logo-yellow-curve {
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 70px;
            height: 20px;
            background-color: #ffdd00;
            border-radius: 0 50% 50% 0;
            transform: rotate(45deg);
        }

        .logo-stars {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 12px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .title-highlight {
            color: #00ff88;
        }

        .content {
            display: flex;
            gap: 40px;
            min-height: 400px;
        }

        .role-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }

        .role-button {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .role-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .role-button.active {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .admin-btn {
            background-color: #dc2626;
        }

        .teacher-btn {
            background-color: #1e3a8a;
        }

        .parent-btn {
            background-color: #0ea5e9;
        }

        .student-btn {
            background-color: #00ff88;
            color: #333;
        }

        .login-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-form {
            background-color: #f8fafc;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0052a3;
        }

        .welcome-message {
            text-align: center;
            color: #6b7280;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .welcome-message h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .content {
                flex-direction: column;
                gap: 30px;
            }

            .role-buttons {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .role-button {
                min-width: 150px;
                min-height: 60px;
                font-size: 1rem;
            }

            .title {
                font-size: 2rem;
            }

            .login-form {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .role-buttons {
                flex-direction: column;
            }

            .role-button {
                min-width: 100%;
            }

            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">
                    <div class="logo-green-curve"></div>
                    <div class="logo-yellow-curve"></div>
                    <div class="logo-stars">★★★★★</div>
                </div>
            </div>
            <h1 class="title">UNIGLOBE <span class="title-highlight">MIS</span></h1>
        </div>

        <div class="content">
            <div class="role-buttons">
                <button class="role-button admin-btn" onclick="selectRole('admin')">
                    Admin
                </button>
                <button class="role-button teacher-btn" onclick="selectRole('teacher')">
                    Teacher
                </button>
                <button class="role-button parent-btn" onclick="selectRole('parent')">
                    Parent
                </button>
                <button class="role-button student-btn" onclick="selectRole('student')">
                    Student
                </button>
            </div>

            <div class="login-area">
                <div id="welcome-message" class="welcome-message">
                    <h3>Welcome to UNIGLOBE MIS</h3>
                    <p>Please select your role from the left to access your login portal.</p>
                </div>

                <form id="login-form" class="login-form hidden">
                    <h2 id="form-title">Login</h2>
                    <div class="form-group">
                        <label for="username">Username/Email</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentRole = '';

        function selectRole(role) {
            // Remove active class from all buttons
            document.querySelectorAll('.role-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.classList.add('active');

            // Update current role
            currentRole = role;

            // Hide welcome message and show login form
            document.getElementById('welcome-message').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');

            // Update form title based on role
            const roleNames = {
                'admin': 'Admin Login',
                'teacher': 'Teacher Login',
                'parent': 'Parent Login',
                'student': 'Student Login'
            };

            document.getElementById('form-title').textContent = roleNames[role];

            // Clear form fields
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username && password) {
                // Demo login - show success message
                alert(`Welcome ${username}! You have successfully logged in as ${currentRole}.`);
                
                // Reset form
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                // Hide form and show welcome message
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('welcome-message').classList.remove('hidden');
                
                // Remove active class from buttons
                document.querySelectorAll('.role-button').forEach(btn => {
                    btn.classList.remove('active');
                });
            } else {
                alert('Please enter both username and password.');
            }
        });

        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add hover effects for better UX
            const roleButtons = document.querySelectorAll('.role-button');
            
            roleButtons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    if (!this.classList.contains('active')) {
                        this.style.transform = 'translateY(-2px)';
                    }
                });
                
                button.addEventListener('mouseleave', function() {
                    if (!this.classList.contains('active')) {
                        this.style.transform = 'translateY(0)';
                    }
                });
            });
        });
    </script>
</body>
</html>
