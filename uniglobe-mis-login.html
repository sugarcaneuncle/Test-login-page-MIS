<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGLOBE MIS - Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border: 2px solid #0066cc;
            border-radius: 12px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            min-height: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background-color: #1e3a8a;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .logo-green-curve {
            position: absolute;
            bottom: -10px;
            left: -10px;
            width: 60px;
            height: 80px;
            background-color: #22c55e;
            border-radius: 50% 0 0 50%;
            transform: rotate(-15deg);
        }

        .logo-yellow-curve {
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 70px;
            height: 40px;
            background-color: #eab308;
            border-radius: 0 50% 50% 0;
            transform: rotate(15deg);
        }

        .logo-stars {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .star:nth-child(1) { top: 0; right: 0; }
        .star:nth-child(2) { top: 8px; right: 8px; }
        .star:nth-child(3) { top: 16px; right: 0; }
        .star:nth-child(4) { top: 4px; right: 16px; }
        .star:nth-child(5) { top: 12px; right: 20px; }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .title-highlight {
            color: #22c55e;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .main-content {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .role-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }

        .role-button {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .role-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .role-button.active {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .admin { background-color: #dc2626; }
        .teacher { background-color: #1e3a8a; }
        .parent { background-color: #0ea5e9; }
        .student { background-color: #22c55e; }

        .login-area {
            flex: 1;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-form {
            background-color: #f8fafc;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0052a3;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .welcome-message h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .welcome-message p {
            margin-bottom: 10px;
        }

        .role-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .main-content {
                flex-direction: column;
                gap: 30px;
            }

            .role-buttons {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: auto;
            }

            .role-button {
                min-width: 150px;
                min-height: 60px;
                font-size: 1rem;
            }

            .title {
                font-size: 2rem;
            }

            .login-form {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .role-buttons {
                flex-direction: column;
            }

            .role-button {
                min-width: 200px;
            }

            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">
                    <div class="logo-green-curve"></div>
                    <div class="logo-yellow-curve"></div>
                    <div class="logo-stars">
                        <div class="star"></div>
                        <div class="star"></div>
                        <div class="star"></div>
                        <div class="star"></div>
                        <div class="star"></div>
                    </div>
                </div>
            </div>
            <h1 class="title">UNIGLOBE <span class="title-highlight">MIS</span></h1>
            <p class="subtitle">Management Information System</p>
        </div>

        <div class="main-content">
            <div class="role-buttons">
                <button class="role-button admin" onclick="selectRole('admin')">
                    <div>
                        <div class="role-icon">👨‍💼</div>
                        Admin
                    </div>
                </button>
                <button class="role-button teacher" onclick="selectRole('teacher')">
                    <div>
                        <div class="role-icon">👨‍🏫</div>
                        Teacher
                    </div>
                </button>
                <button class="role-button parent" onclick="selectRole('parent')">
                    <div>
                        <div class="role-icon">👨‍👩‍👧‍👦</div>
                        Parent
                    </div>
                </button>
                <button class="role-button student" onclick="selectRole('student')">
                    <div>
                        <div class="role-icon">👨‍🎓</div>
                        Student
                    </div>
                </button>
            </div>

            <div class="login-area">
                <div id="welcome-content" class="welcome-message">
                    <h3>Welcome to UNIGLOBE MIS</h3>
                    <p>Please select your role from the left to access your personalized login portal.</p>
                    <p>Choose from Admin, Teacher, Parent, or Student to get started.</p>
                </div>

                <div id="login-form" class="login-form" style="display: none;">
                    <h2 id="form-title">Login</h2>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="username">Username/Email</label>
                            <input type="text" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit" class="login-btn">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRole = '';

        function selectRole(role) {
            // Remove active class from all buttons
            document.querySelectorAll('.role-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.closest('.role-button').classList.add('active');

            // Update current role
            currentRole = role;

            // Hide welcome message and show login form
            document.getElementById('welcome-content').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';

            // Update form title based on role
            const roleNames = {
                'admin': 'Admin Login',
                'teacher': 'Teacher Login',
                'parent': 'Parent Login',
                'student': 'Student Login'
            };

            document.getElementById('form-title').textContent = roleNames[role];
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Demo login functionality
            if (username && password) {
                alert(`Welcome ${username}! You have successfully logged in as ${currentRole}.`);
                
                // Reset form
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                // Show welcome message again
                document.getElementById('welcome-content').style.display = 'block';
                document.getElementById('login-form').style.display = 'none';
                
                // Remove active class from buttons
                document.querySelectorAll('.role-button').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                currentRole = '';
            } else {
                alert('Please enter both username and password.');
            }
        }

        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add hover effects for better UX
            const roleButtons = document.querySelectorAll('.role-button');
            
            roleButtons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    if (!this.classList.contains('active')) {
                        this.style.transform = 'translateY(-2px)';
                    }
                });
                
                button.addEventListener('mouseleave', function() {
                    if (!this.classList.contains('active')) {
                        this.style.transform = 'translateY(0)';
                    }
                });
            });
        });
    </script>
</body>
</html>
